apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: domino-eks-neuron
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: ${AL2023_AMI_ALIAS}
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        encrypted: true
        volumeSize: 500Gi
        volumeType: gp3
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  role: ${EKS_CLUSTER_NAME}-eks-nodes
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${EKS_CLUSTER_NAME}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: ${EKS_CLUSTER_NAME}
  userData: |
    kind: NodeConfig
    spec:
      # FastImagePull enables SOCI snapshotter integration for faster container startup
      # Requires SOCI snapshotter to be pre-installed in the AMI
      # Documentation: https://github.com/awslabs/soci-snapshotter/blob/main/docs/eks.md
      featureGates:
        FastImagePull: true
      kubelet:
        config:
          registryPullQPS: 15
          registryBurst: 50
